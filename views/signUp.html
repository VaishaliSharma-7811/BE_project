<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CryptoVista - Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/signUp.css">
    <link rel="icon" type="image/png" href="/images/Cryptovistalogo.png">


</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <a href="/" class="logo">
            <img src="/images/Cryptovistalogo.png" alt="logo">
            <span class="logo-text">CryptoVista</span>
        </a>
        <div class="search-box">
            <input type="text" placeholder="Search...">
        </div>

    </nav>

    <!-- SIGNUP -->

    <div class="signup-wrapper">

        <div class="signup-card">

            <h2>Create Account</h2>

            <input type="text" id="name" placeholder="Full Name">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <button onclick="signup()">Sign Up</button>

            <div class="toggle">
                Already have an account?
                <span onclick="window.location.href='/login'">Login</span>
            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer class="footer">

        <div class="footer-container">

            <div class="footer-left">

                <div class="footer-logo">
                    <img src="/images/Cryptovistalogo.png">
                    <h2>CRYPTOVISTA</h2>
                </div>

                <p class="footer-address">
                    TG-212, 2nd floor, Turing block <br>
                    Chitkara University, Jansla, Patiala - 173212 <br>
                    Punjab
                </p>

                <p class="copyright">
                    © 2026 CryptoVista. All rights reserved.
                </p>

            </div>

            <div class="footer-right">

                <h3>CryptoVista</h3>

                <ul>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Pricing</a></li>
                    <li><a href="#">Blog</a></li>
                    <li><a href="#">Careers</a></li>
                    <li><a href="#">Help & Support</a></li>
                </ul>

            </div>

        </div>

    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
    <script src="/js/signUp.js"></script>


</body>

</html>
