<!DOCTYPE html>
<html lang="en">
<head>

<body>

<!-- NAVBAR -->

    <div class="logo">CryptoVista</div>

    <div class="search-box">
        <input type="text" placeholder="Search...">
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- MENU -->
<div class="menu">
    <a href="dashboard.html">Explore</a>
    <a href="holdings.html">Holdings</a>

<div class="container">

        </div>

            <div class="trader-name">SolanaPro</div>

            <div class="stat">Followers: 15,890</div>

        </div>

</div>
