<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CryptoVista - Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #0d0d0d;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Login Card */
.container {
    background: #161616;
    padding: 40px;
    width: 350px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0, 255, 191, 0.2);
}

.logo {
    text-align: center;
    font-weight: bold;
    letter-spacing: 2px;
    color: #00e0a4;
    margin-bottom: 25px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* Input Fields */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #1f1f1f;
    color: white;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    background: #00e0a4;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00c58f;
}

/* Toggle Text */
.toggle {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    color: #aaa;
    cursor: pointer;
}

.toggle span {
    color: #00e0a4;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">CRYPTOVISTA</div>

    <h2 id="formTitle">Login</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <div id="nameField" style="display:none;">
        <input type="text" id="username" placeholder="Enter Full Name">
    </div>

    <button id="submitBtn">Login</button>

    <div class="toggle" id="toggleText">
        Don't have an account? <span>Sign Up</span>
    </div>
</div>

<script>
let isLogin = true;

const toggleText = document.getElementById("toggleText");
const formTitle = document.getElementById("formTitle");
const submitBtn = document.getElementById("submitBtn");
const nameField = document.getElementById("nameField");

toggleText.addEventListener("click", function() {
    isLogin = !isLogin;

    if (isLogin) {
        formTitle.innerText = "Login";
        submitBtn.innerText = "Login";
        nameField.style.display = "none";
        toggleText.innerHTML = `Don't have an account? <span>Sign Up</span>`;
    } else {
        formTitle.innerText = "Sign Up";
        submitBtn.innerText = "Sign Up";
        nameField.style.display = "block";
        toggleText.innerHTML = `Already have an account? <span>Login</span>`;
    }
});

submitBtn.addEventListener("click", function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please fill all required fields.");
        return;
    }

    if (!isLogin) {
        const username = document.getElementById("username").value;
        if (!username) {
            alert("Please enter your name.");
            return;
        }
        alert("Signup Successful 🚀");
    } else {
        alert("Login Successful 🚀");
    }
});
</script>

</body>
</html>
