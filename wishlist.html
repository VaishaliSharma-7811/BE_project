<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CryptoVista - Watchlist</title>
<link rel="stylesheet" href="wishlist.css">


</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">CryptoVista</div>

    <div class="search-box">
        <input type="text" placeholder="Search...">
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- MENU -->
<div class="menu">
    <a href="dashboard.html">Explore</a>
    <a href="holdings.html">Holdings</a>
    <a class="active" href="watchlist.html">Watchlist</a>
    <a href="#">Copytrading</a>
    <a href="#">BuyCrypto</a>
</div>

<!-- CONTENT -->
<div class="container">

    <div class="header">
        <h2>Your Watchlist</h2>
        <button class="add-btn" onclick="addCoin()">+ Add Coin</button>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>Coin</th>
                    <th>Price</th>
                    <th>24h Change</th>
                    <th>Market Cap</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="watchlistBody">
                <tr>
                    <td>Bitcoin (BTC)</td>
                    <td>$63,808</td>
                    <td class="red">-1.27%</td>
                    <td>$1.2T</td>
                    <td><button class="remove-btn" onclick="removeRow(this)">Remove</button></td>
                </tr>

                <tr>
                    <td>Ethereum (ETH)</td>
                    <td>$3,450</td>
                    <td class="green">+2.14%</td>
                    <td>$400B</td>
                    <td><button class="remove-btn" onclick="removeRow(this)">Remove</button></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
<script src="wishlist.js"></script>



</body>
</html>
