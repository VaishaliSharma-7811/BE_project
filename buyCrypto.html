<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CryptoVista - Buy Crypto</title>
<link rel="stylesheet" href="buyCrypto.css">

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">CryptoVista</div>

    <div class="search-box">
        <input type="text" placeholder="Search...">
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- MENU -->
<div class="menu">
    <a href="dashboard.html">Explore</a>
    <a href="holdings.html">Holdings</a>
    <a href="watchlist.html">Watchlist</a>
    <a href="copytrading.html">Copytrading</a>
    <a class="active" href="buycrypto.html">BuyCrypto</a>
</div>

<!-- CONTENT -->
<div class="container">

    <div class="buy-card">
        <h2>Buy Cryptocurrency</h2>

        <div class="form-group">
            <label>Select Coin</label>
            <select id="coinSelect" onchange="calculateTotal()">
                <option value="63808">Bitcoin (BTC) - $63,808</option>
                <option value="3450">Ethereum (ETH) - $3,450</option>
                <option value="135">Solana (SOL) - $135</option>
            </select>
        </div>

        <div class="form-group">
            <label>Enter Quantity</label>
            <input type="number" id="quantity" placeholder="Enter amount" oninput="calculateTotal()">
        </div>

        <div class="total-box">
            Total Cost: $<span id="total">0</span>
        </div>

        <button class="buy-btn" onclick="buyCrypto()">Buy Now</button>
    </div>

</div>
<script src="buyCrypto.js"></script>

</body>
</html>
